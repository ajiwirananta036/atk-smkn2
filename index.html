<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATK SMKN 2 - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.3); }
        .btn-active { background: #1e40af; color: white; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.3); }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        .floating-saran { position: fixed; bottom: 100px; right: 20px; z-index: 40; }
        input[type="text"], input[type="password"] { text-transform: uppercase; }
        .low-stock { background: #fff1f2 !important; border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="text-slate-900 pb-24">

    <div class="bg-blue-700 p-8 pt-10 pb-16 rounded-b-[40px] shadow-2xl text-white relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full -mr-10 -mt-10 opacity-50"></div>
        <div class="relative z-10 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">ATK SMKN 2</h1>
            <p id="connectionStatus" class="text-[10px] font-bold opacity-70 tracking-[0.3em] mt-1">SISTEM TERKONEKSI</p>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 -mt-8 relative z-20">
        
        <div id="page-stok" class="space-y-4">
            <div class="bg-white rounded-[30px] card-shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase">
                        <tr><th class="p-5 text-left">Barang</th><th class="p-5 text-center">Sisa</th><th class="p-5 text-center">Aksi</th></tr>
                    </thead>
                    <tbody id="tabel-stok"></tbody>
                </table>
            </div>
        </div>

        <div id="page-ambil" class="hidden">
            <div class="bg-white p-8 rounded-[30px] card-shadow">
                <h2 class="text-xl font-extrabold mb-6 text-slate-800">Form Pengambilan</h2>
                <div class="space-y-4">
                    <select id="select-barang" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 ring-blue-500 outline-none"></select>
                    <input type="number" id="jumlah-ambil" placeholder="JUMLAH" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none">
                    <input type="text" id="nama-pengambil" placeholder="NAMA LENGKAP" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none">
                    <button onclick="ajukanPengambilan()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg shadow-blue-200">Kirim Sekarang</button>
                </div>
            </div>
        </div>

        <div id="page-admin" class="hidden space-y-4">
            <div id="admin-auth" class="bg-white p-8 rounded-[30px] card-shadow text-center">
                <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔒</div>
                <h2 class="font-extrabold text-slate-800 mb-6">Akses Terbatas</h2>
                <div id="login-form">
                    <input type="password" id="pin-admin" placeholder="****" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-center text-2xl tracking-widest mb-4 outline-none">
                    <button id="btn-login" onclick="cekPin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Buka Akses</button>
                    <button onclick="showReset()" class="text-[10px] text-blue-500 mt-6 font-bold uppercase">Lupa PIN?</button>
                </div>
                <div id="reset-form" class="hidden">
                    <input type="email" id="email-reset" style="text-transform:none" placeholder="Email Admin" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-center mb-4 outline-none">
                    <button onclick="verifikasiEmail()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Verifikasi</button>
                </div>
                <div id="new-pin-form" class="hidden">
                    <input type="password" id="pin-baru" placeholder="PIN BARU" class="w-full p-4 bg-slate-50 border-none rounded-2xl text-center mb-4 outline-none">
                    <button onclick="simpanPinBaru()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold">Simpan PIN</button>
                </div>
            </div>

            <div id="admin-content" class="hidden space-y-6">
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl card-shadow">
                    <span class="font-bold text-sm">Mode Admin Aktif</span>
                    <button onclick="logoutAdmin()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 border border-red-100">🚪 LOGOUT</button>
                </div>

                <div class="bg-white p-6 rounded-[30px] card-shadow border-t-4 border-blue-600">
                    <h3 class="font-bold text-xs uppercase text-slate-400 mb-4">Input Stok Baru</h3>
                    <input type="text" id="add-nama" placeholder="NAMA BARANG" class="w-full p-3 bg-slate-50 rounded-xl mb-3 outline-none">
                    <input type="number" id="add-stok" placeholder="STOK AWAL" class="w-full p-3 bg-slate-50 rounded-xl mb-4 outline-none">
                    <div class="p-4 border-2 border-dashed border-slate-100 rounded-2xl text-center mb-4 bg-slate-50 cursor-pointer" onclick="document.getElementById('add-foto').click()">
                        <input type="file" id="add-foto" accept="image/*" capture="environment" class="hidden">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Klik untuk Foto</span>
                        <img id="preview-foto" class="hidden w-32 h-32 object-cover rounded-xl mt-2 mx-auto">
                    </div>
                    <button onclick="tambahBarang()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold">Simpan Ke Database</button>
                </div>

                <div id="list-pending" class="space-y-3"></div>
                <div class="bg-red-50 p-6 rounded-[30px] border border-red-100">
                    <h3 class="text-red-800 font-bold text-xs mb-3">🗑️ TONG SAMPAH (<span id="count-trash">0</span>)</h3>
                    <div id="list-trash" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="floating-saran">
        <button onclick="toggleSaran()" class="w-12 h-12 bg-yellow-400 rounded-full shadow-lg flex items-center justify-center text-xl">💡</button>
        <div id="modal-saran" class="hidden absolute bottom-14 right-0 w-64 bg-white p-4 rounded-2xl shadow-2xl border border-slate-100">
            <h4 class="font-bold text-xs mb-2">Ada Masukan?</h4>
            <textarea id="isi-saran" class="w-full p-2 bg-slate-50 rounded-lg text-xs h-20 outline-none border border-slate-100" placeholder="Ketik saran..."></textarea>
            <button onclick="kirimSaran()" class="w-full bg-slate-900 text-white py-2 rounded-lg text-[10px] font-bold mt-2">KIRIM SARAN</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass-nav p-4 pb-8 flex justify-around items-center z-50 rounded-t-[30px]">
        <button onclick="showPage('stok')" id="nav-stok" class="flex flex-col items-center gap-1 p-2 rounded-2xl transition-all">
            <span class="text-lg">📦</span><span class="text-[8px] font-bold">STOK</span>
        </button>
        <button onclick="showPage('ambil')" id="nav-ambil" class="flex flex-col items-center gap-1 p-2 rounded-2xl transition-all">
            <span class="text-lg">📝</span><span class="text-[8px] font-bold">AMBIL</span>
        </button>
        <button onclick="showPage('admin')" id="nav-admin" class="flex flex-col items-center gap-1 p-2 rounded-2xl transition-all">
            <span class="text-lg">🛠️</span><span class="text-[8px] font-bold">ADMIN</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQvGKmDfpDv1VmvQWMvGpEMJcc2ODX_JWuWBcu0zaq1fZ9HniKrU5FOXJUFSMJtz5Rvg/exec";
        const EMAIL_ADMIN = "ajiwirananta036@gmail.com";
        let db = { barang: [], keluar: [], riwayat: [], pending: [], trash: [], saran: [] };
        let isSaving = false;
        let salahCount = 0;
        let lockUntil = 0;

        if(!localStorage.getItem('adminPIN')) localStorage.setItem('adminPIN', '1234');

        async function loadData() {
            if(isSaving) return;
            try {
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                db = await res.json();
                renderAll();
                document.getElementById('connectionStatus').innerText = "ONLINE";
            } catch (e) { document.getElementById('connectionStatus').innerText = "OFFLINE"; }
        }

        function renderAll() {
            const tabel = document.getElementById('tabel-stok');
            const select = document.getElementById('select-barang');
            const listPending = document.getElementById('list-pending');
            const listTrash = document.getElementById('list-trash');
            
            tabel.innerHTML = "";
            select.innerHTML = '<option value="">Pilih Barang...</option>';
            listPending.innerHTML = "";
            listTrash.innerHTML = "";

            db.barang.forEach((b, index) => {
                const sisa = b.stok_awal - (db.keluar.filter(k => k.nama === b.nama).reduce((a,c) => a + parseInt(c.jumlah), 0));
                tabel.innerHTML += `<tr class="border-b ${sisa < 5 ? 'low-stock' : ''}">
                    <td class="p-5 font-bold text-xs uppercase">${b.nama}</td>
                    <td class="p-5 text-center font-black ${sisa < 5 ? 'text-red-600 animate-pulse' : 'text-slate-600'}">${sisa}</td>
                    <td class="p-5 text-center">${b.img ? `<img src="${b.img}" class="w-10 h-10 rounded-lg shadow-md mx-auto" onclick="alert('Lihat Foto')">` : '-'}</td>
                </tr>`;
                select.innerHTML += `<option value="${b.nama}">${b.nama}</option>`;
            });

            db.pending.forEach((p, idx) => {
                listPending.innerHTML += `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div class="text-[10px]"><b>${p.nama} (${p.jumlah})</b><br>${p.pengambil}</div>
                    <button onclick="approve(${idx})" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">SETUJU</button>
                </div>`;
            });
            document.getElementById('count-trash').innerText = (db.trash || []).length;
            db.trash.forEach((t, idx) => {
                listTrash.innerHTML += `<div class="flex justify-between text-[10px] bg-white p-3 rounded-xl"><span>${t.nama}</span><button onclick="restore(${idx})" class="text-blue-600 font-bold">PULIHKAN</button></div>`;
            });
        }

        function cekPin() {
            if (Date.now() < lockUntil) return;
            const input = document.getElementById('pin-admin').value;
            if (input === localStorage.getItem('adminPIN')) {
                salahCount = 0;
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
            } else {
                salahCount++;
                if (salahCount >= 3) {
                    lockUntil = Date.now() + (180 * 1000);
                    alert("Terkunci 3 Menit!");
                } else { alert(`PIN Salah! (${salahCount}/3)`); }
            }
        }

        function logoutAdmin() {
            document.getElementById('admin-auth').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
            document.getElementById('pin-admin').value = "";
            showPage('stok');
        }

        function toggleSaran() { document.getElementById('modal-saran').classList.toggle('hidden'); }

        async function save() {
            isSaving = true;
            document.getElementById('connectionStatus').innerText = "SAVING...";
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(db) });
                isSaving = false; loadData();
            } catch(e) { isSaving = false; }
        }

        function showPage(p) {
            ['stok','ambil','admin'].forEach(id => {
                document.getElementById('page-'+id).classList.add('hidden');
                document.getElementById('nav-'+id).classList.remove('btn-active');
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('nav-'+p).classList.add('btn-active');
        }

        function showReset() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('reset-form').classList.remove('hidden'); }
        function verifikasiEmail() {
            if(document.getElementById('email-reset').value.toLowerCase() === EMAIL_ADMIN) {
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('new-pin-form').classList.remove('hidden');
            } else { alert("Email salah!"); }
        }
        function simpanPinBaru() {
            localStorage.setItem('adminPIN', document.getElementById('pin-baru').value);
            alert("PIN Baru Disimpan!");
            location.reload();
        }

        function ajukanPengambilan() {
            const n = document.getElementById('select-barang').value;
            const j = document.getElementById('jumlah-ambil').value;
            const p = document.getElementById('nama-pengambil').value.toUpperCase();
            if(!n || !j || !p) return alert("Lengkapi data!");
            db.pending.push({ nama: n, jumlah: j, pengambil: p, ket: "MENUNGGU" });
            save(); alert("Berhasil!");
        }

        function kirimSaran() {
            const t = document.getElementById('isi-saran').value;
            if(!t) return;
            db.saran.push({ teks: t, tgl: new Date().toLocaleString() });
            save(); alert("Terima kasih!");
            toggleSaran();
        }

        function tambahBarang() {
            const n = document.getElementById('add-nama').value.toUpperCase();
            const s = document.getElementById('add-stok').value;
            const i = document.getElementById('preview-foto').src;
            if(!n || !s) return alert("Isi data!");
            db.barang.push({ nama: n, stok_awal: s, img: i.includes('data:image') ? i : "" });
            save();
        }

        document.getElementById('add-foto').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max = 300;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    document.getElementById('preview-foto').src = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('preview-foto').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        loadData();
        showPage('stok');
    </script>
</body>
</html>
