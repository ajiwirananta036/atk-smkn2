<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART ATK - SMKN 2 (Admin Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
        .header-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .nav-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.3); }
        .btn-nav.active { color: #2563eb; transform: translateY(-5px); }
        .btn-nav.active .icon-box { background: #dbeafe; color: #1e40af; border-radius: 15px; }
        .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 8px; padding: 2px 5px; border-radius: 50%; border: 2px solid white; font-weight: bold; }
        input, select { text-transform: uppercase; }
        .stock-warning { animation: shake 0.5s ease-in-out; border: 2px solid #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="pb-28">

    <div class="header-gradient pt-12 pb-20 px-6 rounded-b-[45px] shadow-2xl text-white relative">
        <div class="flex justify-between items-center text-center w-full">
            <div class="w-full">
                <h1 class="text-2xl font-800 tracking-tighter italic">SMART ATK SMKN 2</h1>
                <p id="status-text" class="text-[9px] font-bold opacity-60 tracking-[3px]">SINKRONISASI AKTIF</p>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-5 -mt-10">
        
        <div id="page-stok" class="space-y-4">
            <div class="bg-white/80 backdrop-blur-md rounded-[35px] shadow-xl overflow-hidden border border-white">
                <table class="w-full">
                    <thead class="bg-slate-900/5 text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                        <tr><th class="p-5 text-left">Item</th><th class="p-5 text-center">Tersedia</th><th class="p-5 text-center">Foto</th></tr>
                    </thead>
                    <tbody id="tabel-stok" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="page-ambil" class="hidden">
            <div class="bg-white p-8 rounded-[40px] shadow-2xl border border-white">
                <div class="mb-6">
                    <h2 class="text-2xl font-800 text-slate-800">Ambil Barang</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter">Sistem Validasi Stok Aktif</p>
                </div>
                <div class="space-y-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Pilih ATK</label>
                        <select id="select-barang" onchange="updateMaxStockInfo()" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none font-bold text-slate-700"></select>
                        <p id="info-stok-max" class="text-[10px] ml-2 font-bold text-blue-500"></p>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Jumlah</label>
                        <input type="number" id="jumlah-ambil" placeholder="00" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Nama Lengkap</label>
                        <input type="text" id="nama-pengambil" placeholder="NAMA GURU/STAF" class="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none font-bold">
                    </div>
                    <button onclick="prosesValidasiAmbil()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-800 shadow-xl active:scale-95 transition-all">KIRIM PERMINTAAN</button>
                </div>
            </div>
        </div>

        <div id="page-admin" class="hidden space-y-6">
            <div id="admin-auth" class="bg-white p-10 rounded-[40px] shadow-2xl text-center">
                <div class="text-4xl mb-4">🔐</div>
                <h2 class="text-xl font-800 text-slate-800 mb-6 uppercase">Admin Area</h2>
                <input type="password" id="pin-admin" placeholder="****" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-2xl tracking-[10px] mb-4 outline-none focus:ring-2 ring-red-500">
                <button onclick="cekPin()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold">VERIFIKASI</button>
            </div>

            <div id="admin-content" class="hidden space-y-6">
                <div class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-md border border-slate-100">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase">Status</p><p class="font-bold text-green-600">Admin Aktif</p></div>
                    <button onclick="logoutAdmin()" class="bg-red-500 text-white p-3 rounded-2xl font-bold text-[10px]">LOGOUT</button>
                </div>

                <div class="bg-blue-600 p-6 rounded-[35px] text-white shadow-xl shadow-blue-200">
                    <h3 class="font-bold text-[10px] mb-4 flex items-center gap-2 uppercase tracking-widest">🔔 Permintaan Menunggu</h3>
                    <div id="list-pending" class="space-y-3"></div>
                </div>

                <div class="bg-white p-6 rounded-[35px] shadow-lg border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest">Tambah Item Baru</h3>
                    <div class="space-y-3">
                        <input type="text" id="add-nama" placeholder="NAMA BARANG" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <input type="number" id="add-stok" placeholder="STOK AWAL" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <div onclick="document.getElementById('add-foto').click()" class="p-8 border-2 border-dashed border-slate-200 rounded-3xl text-center bg-slate-50 cursor-pointer">
                            <input type="file" id="add-foto" accept="image/*" capture="environment" class="hidden">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">AMBIL FOTO BARANG</span>
                            <img id="preview-foto" class="hidden w-32 h-32 object-cover rounded-2xl mx-auto mt-2 border-2 border-white shadow-lg">
                        </div>
                        <button onclick="tambahBarang()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">SIMPAN KE STOK</button>
                    </div>
                </div>
                
                <div class="bg-red-50 p-6 rounded-[30px] border border-red-100">
                    <h3 class="text-red-800 font-bold text-[10px] mb-3 uppercase tracking-widest italic">🗑️ Tong Sampah (<span id="count-trash">0</span>)</h3>
                    <div id="list-trash" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-28 right-6 z-50">
        <button onclick="document.getElementById('modal-saran').classList.toggle('hidden')" class="w-12 h-12 bg-white rounded-full shadow-2xl flex items-center justify-center border border-slate-100 text-xl">💡</button>
        <div id="modal-saran" class="hidden absolute bottom-14 right-0 w-64 bg-white p-6 rounded-3xl shadow-2xl border border-slate-100">
            <h4 class="font-bold text-sm mb-3">Saran / Laporan</h4>
            <textarea id="isi-saran" class="w-full p-3 bg-slate-50 rounded-xl text-xs h-24 outline-none" placeholder="Tulis masukan..."></textarea>
            <button onclick="kirimSaran()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-[10px] font-bold mt-3">KIRIM</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 nav-card p-5 px-8 flex justify-around items-center rounded-t-[40px] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-[100]">
        <button onclick="showPage('stok')" id="nav-stok" class="btn-nav active flex flex-col items-center gap-1 transition-all">
            <div class="icon-box p-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg></div>
            <span class="text-[8px] font-black">STOK</span>
        </button>
        <button onclick="showPage('ambil')" id="nav-ambil" class="btn-nav flex flex-col items-center gap-1 transition-all">
            <div class="icon-box p-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></div>
            <span class="text-[8px] font-black">AMBIL</span>
        </button>
        <button onclick="showPage('admin')" id="nav-admin" class="btn-nav flex flex-col items-center gap-1 relative transition-all">
            <div id="notif-badge" class="badge hidden">!</div>
            <div class="icon-box p-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg></div>
            <span class="text-[8px] font-black">ADMIN</span>
        </button>
    </div>

    <script>
        // MASUKKAN LINK /exec KAMU DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbwQvGKmDfpDv1VmvQWMvGpEMJcc2ODX_JWuWBcu0zaq1fZ9HniKrU5FOXJUFSMJtz5Rvg/exec";
        
        let db = { barang: [], keluar: [], riwayat: [], pending: [], trash: [], saran: [] };
        let isSaving = false;

        async function loadData() {
            if(isSaving) return;
            try {
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                db = await res.json();
                renderAll();
                document.getElementById('status-text').innerText = "SINKRONISASI BERHASIL";
            } catch (e) { document.getElementById('status-text').innerText = "OFFLINE"; }
        }

        function getSisaStok(namaBarang) {
            const b = db.barang.find(x => x.nama === namaBarang);
            if (!b) return 0;
            const k = db.keluar.filter(x => x.nama === namaBarang).reduce((a,c) => a + parseInt(c.jumlah), 0);
            return parseInt(b.stok_awal) - k;
        }

        function renderAll() {
            const tabel = document.getElementById('tabel-stok');
            const select = document.getElementById('select-barang');
            const listPending = document.getElementById('list-pending');
            const badge = document.getElementById('notif-badge');
            const listTrash = document.getElementById('list-trash');
            
            tabel.innerHTML = "";
            select.innerHTML = '<option value="">PILIH BARANG...</option>';
            listPending.innerHTML = "";
            listTrash.innerHTML = "";

            db.barang.forEach((b) => {
                const sisa = getSisaStok(b.nama);
                tabel.innerHTML += `<tr class="${sisa < 5 ? 'bg-red-50' : ''}">
                    <td class="p-5 font-bold text-[11px]">${b.nama}</td>
                    <td class="p-5 text-center font-black ${sisa < 5 ? 'text-red-600' : 'text-slate-600'}">${sisa}</td>
                    <td class="p-5 text-center">${b.img ? `<img src="${b.img}" class="w-10 h-10 rounded-xl mx-auto shadow-md">` : '-'}</td>
                </tr>`;
                select.innerHTML += `<option value="${b.nama}">${b.nama}</option>`;
            });

            if (db.pending.length > 0) {
                badge.innerText = db.pending.length;
                badge.classList.remove('hidden');
            } else { badge.classList.add('hidden'); }

            db.pending.forEach((p, idx) => {
                listPending.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex flex-col gap-3 shadow-md border border-blue-400">
                        <div class="flex justify-between items-start text-slate-800">
                            <div class="text-[10px] leading-relaxed">
                                <span class="font-black text-blue-700 uppercase">${p.nama}</span><br>
                                <span class="font-bold">JUMLAH: ${p.jumlah}</span><br>
                                <span class="italic text-slate-400">OLEH: ${p.pengambil}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="approve(${idx})" class="bg-green-600 text-white py-3 rounded-2xl text-[10px] font-black uppercase">Setuju</button>
                            <button onclick="reject(${idx})" class="bg-red-600 text-white py-3 rounded-2xl text-[10px] font-black uppercase">Tolak</button>
                        </div>
                    </div>`;
            });

            document.getElementById('count-trash').innerText = (db.trash || []).length;
            db.trash.forEach((t, idx) => {
                listTrash.innerHTML += `<div class="flex justify-between text-[10px] bg-white p-3 rounded-2xl border border-red-100">
                    <span class="font-bold">${t.nama}</span>
                    <button onclick="restore(${idx})" class="text-blue-600 font-black uppercase">Kembalikan</button>
                </div>`;
            });
        }

        function updateMaxStockInfo() {
            const nama = document.getElementById('select-barang').value;
            const sisa = getSisaStok(nama);
            document.getElementById('info-stok-max').innerText = nama ? `Sisa Stok: ${sisa}` : "";
        }

        function prosesValidasiAmbil() {
            const n = document.getElementById('select-barang').value;
            const j = parseInt(document.getElementById('jumlah-ambil').value);
            const p = document.getElementById('nama-pengambil').value.toUpperCase();
            if(!n || !j || !p) return alert("⚠️ LENGKAPI FORM!");
            
            const sisa = getSisaStok(n);
            if (j > sisa) return alert(`❌ GAGAL! Stok ${n} hanya sisa ${sisa}.`);

            db.pending.push({ nama: n, jumlah: j, pengambil: p, ket: "PENDING" });
            save(); alert("✅ BERHASIL! Menunggu persetujuan Admin.");
            document.getElementById('jumlah-ambil').value = "";
            document.getElementById('nama-pengambil').value = "";
        }

        // FUNGSI ADMIN
        function approve(idx) {
            const p = db.pending[idx];
            db.keluar.push({ nama: p.nama, jumlah: p.jumlah });
            db.pending.splice(idx, 1);
            save();
        }

        function reject(idx) {
            if(confirm("Yakin ingin MENOLAK permintaan ini?")) {
                db.pending.splice(idx, 1);
                save();
            }
        }

        async function save() {
            isSaving = true;
            document.getElementById('status-text').innerText = "MENYIMPAN DATA...";
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(db) });
                isSaving = false; loadData();
            } catch(e) { isSaving = false; }
        }

        function showPage(p) {
            ['stok','ambil','admin'].forEach(id => {
                document.getElementById('page-'+id).classList.add('hidden');
                document.getElementById('nav-'+id).classList.remove('active');
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('nav-'+p).classList.add('active');
        }

        function cekPin() {
            const pin = document.getElementById('pin-admin').value;
            if (pin === (localStorage.getItem('adminPIN') || '1234')) {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
            } else { alert("PIN SALAH!"); }
        }

        function logoutAdmin() {
            document.getElementById('admin-auth').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
            document.getElementById('pin-admin').value = "";
            showPage('stok');
        }

        function tambahBarang() {
            const n = document.getElementById('add-nama').value.toUpperCase();
            const s = document.getElementById('add-stok').value;
            const i = document.getElementById('preview-foto').src;
            if(!n || !s) return alert("Lengkapi!");
            db.barang.push({ nama: n, stok_awal: s, img: i.includes('data:image') ? i : "" });
            save();
            document.getElementById('add-nama').value = "";
            document.getElementById('add-stok').value = "";
            document.getElementById('preview-foto').classList.add('hidden');
        }

        document.getElementById('add-foto').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max = 300;
                    let w = img.width, h = img.height;
                    if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    document.getElementById('preview-foto').src = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('preview-foto').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function restore(idx) {
            db.barang.push(db.trash[idx]);
            db.trash.splice(idx, 1);
            save();
        }

        function kirimSaran() {
            const t = document.getElementById('isi-saran').value;
            if(!t) return;
            db.saran.push({ teks: t, tgl: new Date().toLocaleString() });
            save(); alert("Saran Terkirim!");
            document.getElementById('modal-saran').classList.add('hidden');
            document.getElementById('isi-saran').value = "";
        }

        setInterval(loadData, 20000); // Sinkronisasi setiap 20 detik
        loadData();
        showPage('stok');
    </script>
</body>
</html>
