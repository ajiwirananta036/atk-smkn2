<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem ATK SMKN 2 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="text"] { text-transform: uppercase; }
        .low-stock { border-left: 6px solid #ef4444; background-color: #fff1f2 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse-fast { animation: pulse 1s infinite; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div class="bg-blue-900 p-5 text-white text-center shadow-xl sticky top-0 z-50">
        <h1 class="text-xl font-black">ADMIN ATK SMKN 2</h1>
        <p id="connectionStatus" class="text-[10px] text-blue-300 font-bold mt-1">INITIALIZING...</p>
    </div>

    <div class="max-w-md mx-auto p-4 pb-24">
        
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="showPage('stok')" class="bg-white py-3 rounded-xl shadow-sm font-bold text-blue-800 border-b-4 border-blue-200">📦 STOK</button>
            <button onclick="showPage('ambil')" class="bg-white py-3 rounded-xl shadow-sm font-bold text-green-800 border-b-4 border-green-200">📝 AMBIL</button>
            <button onclick="showPage('admin')" class="bg-white py-3 rounded-xl shadow-sm font-bold text-red-800 border-b-4 border-red-200">🛠️ ADMIN</button>
        </div>

        <div id="page-stok" class="space-y-4">
            <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-200">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-[10px] uppercase">
                        <tr>
                            <th class="p-4">Barang</th>
                            <th class="p-4 text-center">Sisa</th>
                            <th class="p-4 text-center">Foto</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-stok"></tbody>
                </table>
            </div>
        </div>

        <div id="page-ambil" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-lg">
                <h2 class="font-black text-slate-800 mb-5 border-b pb-2">FORM AMBIL ATK</h2>
                <div class="space-y-4">
                    <select id="select-barang" class="w-full p-3 bg-slate-50 border rounded-xl"></select>
                    <input type="number" id="jumlah-ambil" placeholder="Jumlah" class="w-full p-3 bg-slate-50 border rounded-xl">
                    <input type="text" id="nama-pengambil" placeholder="Nama Guru/Petugas" class="w-full p-3 bg-slate-50 border rounded-xl">
                    <button onclick="ajukanPengambilan()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-black">KIRIM PENGAJUAN</button>
                </div>
            </div>
        </div>

        <div id="page-admin" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border-t-8 border-red-600">
                <h2 class="font-bold text-red-700 mb-4 uppercase text-sm">Input Barang Baru</h2>
                <input type="text" id="add-nama" placeholder="NAMA BARANG" class="w-full p-3 border rounded-xl mb-3">
                <input type="number" id="add-stok" placeholder="STOK AWAL" class="w-full p-3 border rounded-xl mb-4">
                
                <div class="flex flex-col items-center p-4 border-2 border-dashed border-slate-200 rounded-2xl mb-4 bg-slate-50">
                    <input type="file" id="add-foto" accept="image/*" capture="environment" class="hidden">
                    <button onclick="document.getElementById('add-foto').click()" class="bg-slate-700 text-white px-6 py-2 rounded-full text-xs font-bold mb-3">📸 FOTO BARANG</button>
                    <img id="preview-foto" class="hidden w-32 h-32 object-cover rounded-xl shadow-lg border-2 border-white">
                </div>
                <button onclick="tambahBarang()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">SIMPAN KE DATABASE</button>
            </div>

            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                <h3 class="font-bold text-orange-800 text-xs mb-3 uppercase">Persetujuan Pending</h3>
                <div id="list-pending" class="space-y-2"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl border shadow-sm">
                <h3 class="font-bold text-slate-500 text-xs mb-3 uppercase">Kelola / Hapus Barang</h3>
                <div id="list-manage" class="space-y-2"></div>
            </div>

            <div class="bg-red-50 p-4 rounded-2xl border-2 border-red-100">
                <h3 class="font-bold text-red-800 text-xs mb-3 uppercase">🗑️ TONG SAMPAH (<span id="count-trash">0</span>)</h3>
                <div id="list-trash" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN LINK GOOGLE SCRIPT (/exec) KAMU DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbwQvGKmDfpDv1VmvQWMvGpEMJcc2ODX_JWuWBcu0zaq1fZ9HniKrU5FOXJUFSMJtz5Rvg/exec";

        let db = { barang: [], keluar: [], riwayat: [], pending: [], trash: [] };
        let isSaving = false;

        async function loadData() {
            if(isSaving) return;
            try {
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                db = await res.json();
                if(!db.trash) db.trash = [];
                renderAll();
                document.getElementById('connectionStatus').innerText = "✅ DATA TERHUBUNG";
            } catch (e) {
                document.getElementById('connectionStatus').innerText = "❌ GAGAL KONEKSI";
            }
        }

        function renderAll() {
            const tabel = document.getElementById('tabel-stok');
            const select = document.getElementById('select-barang');
            const listPending = document.getElementById('list-pending');
            const listManage = document.getElementById('list-manage');
            const listTrash = document.getElementById('list-trash');
            
            tabel.innerHTML = "";
            select.innerHTML = '<option value="">Pilih Barang...</option>';
            listPending.innerHTML = "";
            listManage.innerHTML = "";
            listTrash.innerHTML = "";

            db.barang.forEach((b, index) => {
                const sisa = b.stok_awal - (db.keluar.filter(k => k.nama === b.nama).reduce((a,c) => a + parseInt(c.jumlah), 0));
                const isLow = sisa < 5;

                tabel.innerHTML += `
                    <tr class="border-b ${index % 2 === 0 ? 'bg-white' : 'bg-blue-50'} ${isLow ? 'low-stock' : ''}">
                        <td class="p-4 font-bold text-slate-700 text-sm uppercase">${b.nama}</td>
                        <td class="p-4 text-center font-black ${isLow ? 'text-red-600 animate-pulse-fast' : 'text-slate-600'}">${sisa}</td>
                        <td class="p-4 text-center">
                            ${b.img ? `<img src="${b.img}" class="w-10 h-10 rounded shadow mx-auto" onclick="alert('Lihat Foto')">` : '-'}
                        </td>
                    </tr>
                `;
                select.innerHTML += `<option value="${b.nama}">${b.nama.toUpperCase()}</option>`;
                listManage.innerHTML += `
                    <div class="flex justify-between items-center text-[10px] p-2 bg-slate-50 border rounded">
                        <span>${b.nama.toUpperCase()}</span>
                        <button onclick="moveToTrash(${index})" class="text-red-600 font-bold">HAPUS</button>
                    </div>
                `;
            });

            db.pending.forEach((p, idx) => {
                listPending.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border border-orange-200 flex justify-between items-center text-[10px]">
                        <div><b>${p.nama.toUpperCase()} (${p.jumlah})</b><br>${p.pengambil}</div>
                        <button onclick="approve(${idx})" class="bg-green-600 text-white px-3 py-1 rounded-lg font-bold shadow">OK</button>
                    </div>
                `;
            });

            document.getElementById('count-trash').innerText = db.trash.length;
            db.trash.forEach((t, idx) => {
                listTrash.innerHTML += `
                    <div class="flex justify-between text-[10px] bg-white p-2 rounded border border-red-100">
                        <span>${t.nama.toUpperCase()}</span>
                        <div class="flex gap-2">
                            <button onclick="restore(${idx})" class="text-blue-600 font-bold uppercase">Pulihkan</button>
                            <button onclick="permanentDelete(${idx})" class="text-red-600 font-bold">X</button>
                        </div>
                    </div>
                `;
            });
        }

        // Kompres Foto agar Ringan
        document.getElementById('add-foto').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 300;
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    document.getElementById('preview-foto').src = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('preview-foto').classList.remove('hidden');
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        };

        async function save() {
            isSaving = true;
            document.getElementById('connectionStatus').innerText = "☁️ MENYIMPAN DATA...";
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(db) });
                document.getElementById('connectionStatus').innerText = "✅ BERHASIL DISIMPAN";
                setTimeout(() => { isSaving = false; loadData(); }, 1500);
            } catch(e) { 
                alert("Gagal simpan! Cek koneksi.");
                isSaving = false;
                document.getElementById('connectionStatus').innerText = "❌ GAGAL SIMPAN";
            }
        }

        function tambahBarang() {
            const nama = document.getElementById('add-nama').value.toUpperCase();
            const stok = document.getElementById('add-stok').value;
            const img = document.getElementById('preview-foto').src;
            if(!nama || !stok) return alert("Isi Nama & Stok!");
            db.barang.push({ nama, stok_awal: stok, img: img.includes('data:image') ? img : "" });
            save();
            document.getElementById('add-nama').value = "";
            document.getElementById('add-stok').value = "";
            document.getElementById('preview-foto').classList.add('hidden');
        }

        function ajukanPengambilan() {
            const nama = document.getElementById('select-barang').value;
            const jumlah = document.getElementById('jumlah-ambil').value;
            const pengambil = document.getElementById('nama-pengambil').value.toUpperCase();
            if(!nama || !jumlah || !pengambil) return alert("Lengkapi Form!");
            db.pending.push({ nama, jumlah, pengambil, ket: "MENUNGGU" });
            save();
            alert("Terima kasih! Pengajuan terkirim.");
        }

        function approve(idx) {
            const p = db.pending[idx];
            db.keluar.push({ nama: p.nama, jumlah: p.jumlah });
            db.riwayat.push({ ...p, tgl: new Date().toLocaleString(), ket: "BERHASIL" });
            db.pending.splice(idx, 1);
            save();
        }

        function moveToTrash(idx) {
            if(confirm("Pindahkan ke tong sampah?")) {
                db.trash.push(db.barang[idx]);
                db.barang.splice(idx, 1);
                save();
            }
        }

        function restore(idx) {
            db.barang.push(db.trash[idx]);
            db.trash.splice(idx, 1);
            save();
        }

        function permanentDelete(idx) {
            if(confirm("Hapus permanen? Data tidak bisa kembali.")) {
                db.trash.splice(idx, 1);
                save();
            }
        }

        function showPage(p) {
            ['stok','ambil','admin'].forEach(id => document.getElementById('page-'+id).classList.add('hidden'));
            document.getElementById('page-'+p).classList.remove('hidden');
        }

        loadData();
    </script>
</body>
</html>
