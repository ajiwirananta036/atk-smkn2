<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATK ONLINE SMKN 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin-bottom: 120px; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #2563eb 100%); }
        .nav-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; z-index: 999; display: flex; justify-content: space-around; padding: 15px 0 25px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .btn-nav { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-nav.active { color: #2563eb; transform: translateY(-3px); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 50%; border: 2px solid white; }
        input, select { text-transform: uppercase; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="header-gradient pt-12 pb-20 px-8 rounded-b-[40px] shadow-lg text-white text-center">
        <h1 class="text-xl font-extrabold italic uppercase tracking-tighter">ATK ONLINE</h1>
        <p class="text-xs opacity-80 uppercase font-bold">SMK Negeri 2 Ponorogo</p>
        <div id="status-text" class="text-[9px] mt-3 font-bold text-blue-200 tracking-widest opacity-80 uppercase italic">Connecting...</div>
    </div>

    <div class="max-w-6xl mx-auto px-4 -mt-10 relative z-10">
        
        <div id="page-stok" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-[25px] card-shadow overflow-hidden">
                <div class="bg-slate-800 p-3 text-white text-[10px] font-black text-center uppercase tracking-widest">📦 Kelompok ATK</div>
                <table class="w-full text-left">
                    <tbody id="tabel-atk" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            
            <div class="bg-white rounded-[25px] card-shadow overflow-hidden border">
                <div class="bg-blue-800 p-3 text-white text-[10px] font-black text-center uppercase tracking-widest">🧹 Kelompok Kebersihan</div>
                <table class="w-full text-left">
                    <tbody id="tabel-kebersihan" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="page-ambil" class="hidden max-w-md mx-auto bg-white p-8 rounded-[30px] card-shadow">
            <h2 class="text-center font-extrabold text-slate-800 mb-6 uppercase">Ambil Barang</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-1 uppercase">1. Kategori</label>
                    <select id="filter-kategori" onchange="loadDropdown()" class="w-full p-4 bg-slate-100 rounded-xl font-bold border-none outline-none">
                        <option value="ATK">ATK (Alat Tulis Kantor)</option>
                        <option value="KEBERSIHAN">Alat Kebersihan</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-1 uppercase">2. Nama Barang</label>
                    <select id="select-barang" onchange="updateInfoStok()" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none border"></select>
                    <p id="info-sisa" class="text-[10px] font-bold text-blue-600 mt-1 ml-1"></p>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-1 uppercase">3. Jumlah</label>
                    <input type="number" id="input-jumlah" placeholder="0" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-1 uppercase">4. Nama Pengambil</label>
                    <input type="text" id="input-nama" placeholder="NAMA GURU / STAFF" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
                </div>
                <button onclick="kirimPermintaan()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg uppercase active:scale-95 transition-all">Kirim Sekarang</button>
            </div>
        </div>

        <div id="page-admin" class="hidden">
            <div id="admin-login" class="max-w-md mx-auto bg-white p-10 rounded-[30px] shadow-xl text-center">
                <p class="text-[10px] font-bold text-slate-400 mb-4 uppercase">Restricted Area</p>
                <input type="password" id="input-pin" placeholder="****" class="w-full p-4 bg-slate-50 rounded-xl text-center text-2xl tracking-[10px] mb-4 outline-none border">
                <button onclick="loginAdmin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase tracking-widest">Login</button>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <div class="bg-blue-600 p-6 rounded-[30px] text-white">
                    <h3 class="text-[10px] font-black uppercase mb-4 tracking-widest">Persetujuan Pending</h3>
                    <div id="container-pending" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[30px] shadow-lg border">
                        <h3 class="text-[10px] font-black text-slate-800 uppercase mb-4 tracking-widest">Kelola ATK</h3>
                        <div id="kelola-atk" class="space-y-2"></div>
                    </div>
                    <div class="bg-white p-6 rounded-[30px] shadow-lg border">
                        <h3 class="text-[10px] font-black text-blue-800 uppercase mb-4 tracking-widest">Kelola Kebersihan</h3>
                        <div id="kelola-kebersihan" class="space-y-2"></div>
                    </div>
                </div>

                <div class="max-w-md mx-auto bg-white p-6 rounded-[30px] shadow-xl border-t-4 border-slate-900">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Tambah Barang Baru</h3>
                    <div class="space-y-3">
                        <select id="new-kat" class="w-full p-4 bg-slate-50 rounded-xl font-bold border">
                            <option value="ATK">ATK</option>
                            <option value="KEBERSIHAN">Alat Kebersihan</option>
                        </select>
                        <input type="text" id="new-nama" placeholder="NAMA BARANG" class="w-full p-4 bg-slate-50 rounded-xl font-bold border">
                        <input type="number" id="new-stok" placeholder="STOK AWAL" class="w-full p-4 bg-slate-50 rounded-xl font-bold border">
                        <div onclick="document.getElementById('file-foto').click()" class="p-4 border-2 border-dashed rounded-xl text-center bg-slate-50 cursor-pointer">
                            <input type="file" id="file-foto" accept="image/*" class="hidden">
                            <span class="text-[9px] font-bold text-slate-400 uppercase">Klik Foto (Opsional)</span>
                            <img id="prev-foto" class="hidden w-20 h-20 object-cover rounded-lg mx-auto mt-2">
                        </div>
                        <button onclick="simpanBarangBaru()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase">Simpan Barang</button>
                    </div>
                </div>
                
                <button onclick="logout()" class="max-w-md mx-auto block w-full bg-red-100 text-red-600 font-bold text-xs uppercase p-5 rounded-2xl mb-10">Keluar dari Admin</button>
            </div>
        </div>
    </div>

    <div class="nav-fixed">
        <button onclick="navKe('stok')" id="btn-stok" class="btn-nav active">
            <span class="text-xl">📦</span><span>Stok</span>
        </button>
        <button onclick="navKe('ambil')" id="btn-ambil" class="btn-nav">
            <span class="text-xl">📝</span><span>Ambil</span>
        </button>
        <button onclick="navKe('admin')" id="btn-admin" class="btn-nav relative">
            <div id="badge-notif" class="badge hidden">0</div>
            <span class="text-xl">🛠️</span><span>Admin</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQvGKmDfpDv1VmvQWMvGpEMJcc2ODX_JWuWBcu0zaq1fZ9HniKrU5FOXJUFSMJtz5Rvg/exec";
        const WA_ADMIN = "6281249733106";
        
        let localDB = { barang: [], keluar: [], pending: [], settings: { pin: "1234" } };
        let sedangProses = false;
        let fotoData = "";

        async function ambilData() {
            if(sedangProses) return;
            try {
                const res = await fetch(API_URL + "?t=" + Date.now());
                const data = await res.json();
                if(data) {
                    localDB = data;
                    if(!localDB.settings) localDB.settings = { pin: "1234" };
                    tampilkanSemua();
                    document.getElementById('status-text').innerText = "✅ System Connected";
                }
            } catch (e) { document.getElementById('status-text').innerText = "❌ Connection Failed"; }
        }

        function hitungSisa(nama) {
            const b = localDB.barang.find(x => x.nama === nama);
            if(!b) return 0;
            const terpakai = (localDB.keluar || []).filter(x => x.nama === nama).reduce((a,c) => a + parseInt(c.jumlah), 0);
            return parseInt(b.stok_awal) - terpakai;
        }

        function tampilkanSemua() {
            const tAtk = document.getElementById('tabel-atk');
            const tKeb = document.getElementById('tabel-kebersihan');
            const kAtk = document.getElementById('kelola-atk');
            const kKeb = document.getElementById('kelola-kebersihan');
            const tPending = document.getElementById('container-pending');
            const bNotif = document.getElementById('badge-notif');

            tAtk.innerHTML = ""; tKeb.innerHTML = ""; kAtk.innerHTML = ""; kKeb.innerHTML = ""; tPending.innerHTML = "";

            localDB.barang.forEach(b => {
                const sisa = hitungSisa(b.nama);
                const row = `<tr class="text-[11px] border-b">
                    <td class="p-4 font-bold text-slate-700 uppercase">${b.nama}</td>
                    <td class="p-4 text-center font-black ${sisa < 5 ? 'text-red-500' : 'text-slate-900'}">${sisa}</td>
                    <td class="p-4 text-center">${b.img ? `<img src="${b.img}" class="w-10 h-10 rounded-lg mx-auto object-cover">` : '-'}</td>
                </tr>`;

                const btnManage = `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border">
                        <div class="text-[9px] font-bold uppercase">${b.nama} <br><span class="text-blue-600">SISA: ${sisa}</span></div>
                        <div class="flex gap-1">
                            <button onclick="editBarang('${b.nama}')" class="bg-blue-600 text-white px-2 py-1 rounded text-[8px] font-bold">EDIT</button>
                            <button onclick="hapusBarang('${b.nama}')" class="bg-red-500 text-white px-2 py-1 rounded text-[8px] font-bold">HAPUS</button>
                        </div>
                    </div>`;

                if(b.kategori === "KEBERSIHAN") {
                    tKeb.innerHTML += row;
                    kKeb.innerHTML += btnManage;
                } else {
                    tAtk.innerHTML += row;
                    kAtk.innerHTML += btnManage;
                }
            });

            if(localDB.pending && localDB.pending.length > 0) {
                bNotif.innerText = localDB.pending.length;
                bNotif.classList.remove('hidden');
                localDB.pending.forEach((p, i) => {
                    tPending.innerHTML += `
                        <div class="bg-white p-3 rounded-xl text-slate-800 shadow-md">
                            <div class="text-[10px] font-black uppercase">${p.nama} (${p.jumlah})</div>
                            <div class="text-[9px] opacity-60 font-bold mb-2">PENGAMBIL: ${p.pengambil}</div>
                            <div class="flex gap-2">
                                <button onclick="actionApprove(${i})" class="bg-green-600 text-white flex-1 py-2 rounded-lg font-bold text-[9px]">SETUJU</button>
                                <button onclick="actionReject(${i})" class="bg-red-600 text-white flex-1 py-2 rounded-lg font-bold text-[9px]">TOLAK</button>
                            </div>
                        </div>`;
                });
            } else { bNotif.classList.add('hidden'); }
        }

        function loadDropdown() {
            const kat = document.getElementById('filter-kategori').value;
            const el = document.getElementById('select-barang');
            el.innerHTML = '<option value="">-- PILIH BARANG --</option>';
            
            // Filter hanya yang kategorinya cocok
            const list = localDB.barang.filter(x => x.kategori === kat);
            
            if(list.length === 0) {
                el.innerHTML = '<option value="">BARANG BELUM DIINPUT</option>';
            } else {
                list.forEach(b => {
                    const sisa = hitungSisa(b.nama);
                    const opt = document.createElement('option');
                    opt.value = b.nama;
                    opt.textContent = `${b.nama} (SISA: ${sisa})`;
                    el.appendChild(opt);
                });
            }
            updateInfoStok();
        }

        function updateInfoStok() {
            const n = document.getElementById('select-barang').value;
            const info = document.getElementById('info-sisa');
            if(!n) { info.innerText = ""; return; }
            info.innerText = `STOK TERSEDIA: ${hitungSisa(n)}`;
        }

        function navKe(p) {
            ['stok','ambil','admin'].forEach(x => {
                document.getElementById('page-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('active');
            });
            document.getElementById('page-'+p).classList.remove('hidden');
            document.getElementById('btn-'+p).classList.add('active');
            if(p === 'ambil') loadDropdown();
        }

        async function push() {
            sedangProses = true;
            document.getElementById('status-text').innerText = "☁️ Syncing Cloud...";
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(localDB) });
                sedangProses = false; 
                ambilData();
            } catch(e) { sedangProses = false; }
        }

        function simpanBarangBaru() {
            const n = document.getElementById('new-nama').value.trim().toUpperCase();
            const s = document.getElementById('new-stok').value;
            const k = document.getElementById('new-kat').value; // Ambil nilai kategori
            
            if(!n || !s) return alert("NAMA DAN STOK HARUS DIISI!");

            localDB.barang.push({ 
                nama: n, 
                stok_awal: parseInt(s), 
                kategori: k, 
                img: fotoData 
            });

            // Reset Form
            document.getElementById('new-nama').value = "";
            document.getElementById('new-stok').value = "";
            document.getElementById('prev-foto').classList.add('hidden');
            fotoData = "";
            
            push();
            alert("BARANG BERHASIL DISIMPAN KE KELOMPOK " + k);
        }

        function kirimPermintaan() {
            const n = document.getElementById('select-barang').value;
            const j = document.getElementById('input-jumlah').value;
            const p = document.getElementById('input-nama').value.trim().toUpperCase();
            
            if(!n || !j || !p) return alert("LENGKAPI FORM!");
            if(parseInt(j) > hitungSisa(n)) return alert("STOK TIDAK CUKUP!");

            if(!localDB.pending) localDB.pending = [];
            localDB.pending.push({ nama: n, jumlah: parseInt(j), pengambil: p });
            
            push();
            alert("PERMINTAAN DIKIRIM! MENUNGGU PERSETUJUAN ADMIN.");
            window.location.href = `https://wa.me/${WA_ADMIN}?text=*KONFIRMASI AMBIL ATK*%0A%0ANama: ${p}%0ABarang: ${n}%0AJumlah: ${j}`;
        }

        function actionApprove(i) {
            const item = localDB.pending[i];
            localDB.keluar.push({ nama: item.nama, jumlah: item.jumlah });
            localDB.pending.splice(i, 1);
            push();
        }

        function actionReject(i) {
            localDB.pending.splice(i, 1);
            push();
        }

        function loginAdmin() {
            const pinBox = document.getElementById('input-pin');
            const pinVal = pinBox.value;
            if(pinVal === "ajiwirananta036") {
                const newPin = prompt("PIN BARU:");
                if(newPin) { localDB.settings.pin = newPin; push(); alert("PIN DIGANTI!"); }
                pinBox.value = ""; return;
            }
            if(pinVal === (localDB.settings.pin || "1234")) {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else { alert("PIN SALAH!"); pinBox.value = ""; }
        }

        function logout() {
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('input-pin').value = "";
            navKe('stok');
        }

        function editBarang(n) {
            const b = localDB.barang.find(x => x.nama === n);
            const baru = prompt("UBAH STOK AWAL " + n + ":", b.stok_awal);
            if(baru) { b.stok_awal = parseInt(baru); push(); }
        }

        function hapusBarang(n) {
            if(confirm("HAPUS " + n + "?")) {
                localDB.barang = localDB.barang.filter(x => x.nama !== n);
                localDB.keluar = localDB.keluar.filter(x => x.nama !== n);
                push();
            }
        }

        document.getElementById('file-foto').onchange = function(e) {
            const f = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = new Image();
                img.onload = function() {
                    const can = document.createElement('canvas');
                    can.width = 150; can.height = 150;
                    can.getContext('2d').drawImage(img, 0,0, 150, 150);
                    fotoData = can.toDataURL('image/jpeg', 0.5);
                    document.getElementById('prev-foto').src = fotoData;
                    document.getElementById('prev-foto').classList.remove('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(f);
        };

        ambilData();
        setInterval(ambilData, 30000);
    </script>
</body>
</html>
