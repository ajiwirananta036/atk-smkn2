<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART CONTROL v7.0</smk_negeri_2_ponorogo>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .nav-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-nav.active { color: #2563eb; transform: translateY(-5px); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 50%; border: 2px solid white; font-weight: 800; }
        input, select { text-transform: uppercase; }
    </style>
</head>
<body class="pb-28">

    <div class="header-gradient pt-14 pb-24 px-8 rounded-b-[50px] shadow-2xl text-white relative">
        <h1 class="text-3xl font-800 tracking-tighter italic">SMART CONTROL</h1>
        <p id="status-text" class="text-[10px] font-bold opacity-50 tracking-[4px] mt-1 uppercase text-blue-200">System Ready</p>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-12 relative z-20">
        
        <div id="page-stok" class="space-y-6">
            <div class="bg-white rounded-[30px] shadow-xl overflow-hidden border border-white">
                <div class="bg-slate-800 p-4 text-white text-[10px] font-black tracking-widest uppercase">📦 Kelompok ATK</div>
                <table class="w-full">
                    <tbody id="tabel-atk" class="divide-y divide-slate-50 text-slate-700"></tbody>
                </table>
            </div>
            <div class="bg-white rounded-[30px] shadow-xl overflow-hidden border border-white">
                <div class="bg-blue-800 p-4 text-white text-[10px] font-black tracking-widest uppercase">🧹 Kelompok Kebersihan</div>
                <table class="w-full">
                    <tbody id="tabel-kebersihan" class="divide-y divide-slate-50 text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div id="page-ambil" class="hidden">
            <div class="bg-white p-8 rounded-[40px] shadow-2xl">
                <h2 class="text-2xl font-800 text-slate-800 mb-6">Ambil Barang</h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Kategori</label>
                        <select id="filter-kategori-ambil" onchange="filterBarangByKategori()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold">
                            <option value="ATK">ATK</option>
                            <option value="KEBERSIHAN">ALAT KEBERSIHAN</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Nama Barang</label>
                        <select id="select-barang" onchange="updateMaxStockInfo()" class="w-full p-4 bg-slate-50 rounded-2xl font-bold"></select>
                        <p id="info-stok-max" class="text-[10px] ml-2 font-bold text-blue-600"></p>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Jumlah</label>
                        <input type="number" id="jumlah-ambil" placeholder="0" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Nama Pengambil</label>
                        <input type="text" id="nama-pengambil" placeholder="NAMA GURU / STAF" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    </div>
                    <button onclick="prosesValidasiAmbil()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-800 shadow-xl active:scale-95 transition-all">KIRIM PERMINTAAN</button>
                </div>
            </div>
        </div>

        <div id="page-admin" class="hidden space-y-6">
            <div id="admin-auth" class="bg-white p-10 rounded-[40px] shadow-2xl text-center">
                <h2 class="text-xl font-800 text-slate-800 mb-6 uppercase text-xs">PIN ADMIN</h2>
                <input type="password" id="pin-admin" placeholder="****" class="w-full p-5 bg-slate-50 rounded-2xl text-center text-3xl tracking-[12px] mb-6 outline-none">
                <button onclick="cekPin()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold">LOGIN</button>
            </div>

            <div id="admin-content" class="hidden space-y-6">
                <div class="bg-blue-600 p-8 rounded-[40px] text-white shadow-xl">
                    <h3 class="font-bold text-[10px] mb-6 uppercase tracking-widest">🔔 Permintaan Pending</h3>
                    <div id="list-pending" class="space-y-4"></div>
                </div>

                <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">📋 Manage Stok & Foto</h3>
                    <div id="admin-manage-stok" class="space-y-4"></div>
                </div>

                <div class="bg-white p-8 rounded-[40px] shadow-xl border-t-4 border-slate-900">
                    <h3 class="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">➕ Tambah Barang Baru</h3>
                    <div class="space-y-4">
                        <select id="add-kategori" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                            <option value="ATK">ATK</option>
                            <option value="KEBERSIHAN">ALAT KEBERSIHAN</option>
                        </select>
                        <input type="text" id="add-nama" placeholder="NAMA BARANG" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <input type="number" id="add-stok" placeholder="STOK AWAL" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <div onclick="document.getElementById('add-foto').click()" class="p-8 border-2 border-dashed border-slate-100 rounded-3xl text-center bg-slate-50 cursor-pointer">
                            <input type="file" id="add-foto" accept="image/*" capture="environment" class="hidden">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">UPLOAD FOTO</span>
                            <img id="preview-foto" class="hidden w-32 h-32 object-cover rounded-3xl mx-auto mt-4 shadow-lg">
                        </div>
                        <button onclick="tambahBarang()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold">SIMPAN DATA</button>
                    </div>
                </div>
                <button onclick="logoutAdmin()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-bold text-xs">KELUAR ADMIN</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 nav-card p-6 px-10 flex justify-around items-center rounded-t-[45px] shadow-2xl z-[100]">
        <button onclick="showPage('stok')" id="nav-stok" class="btn-nav active flex flex-col items-center gap-1">
            <span class="text-xl">📦</span><span class="text-[9px] font-black tracking-widest">STOK</span>
        </button>
        <button onclick="showPage('ambil')" id="nav-ambil" class="btn-nav flex flex-col items-center gap-1">
            <span class="text-xl">📝</span><span class="text-[9px] font-black tracking-widest">AMBIL</span>
        </button>
        <button onclick="showPage('admin')" id="nav-admin" class="btn-nav flex flex-col items-center gap-1 relative">
            <div id="notif-badge" class="badge hidden">0</div>
            <span class="text-xl">🛠️</span><span class="text-[9px] font-black tracking-widest">ADMIN</span>
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQvGKmDfpDv1VmvQWMvGpEMJcc2ODX_JWuWBcu0zaq1fZ9HniKrU5FOXJUFSMJtz5Rvg/exec";
        const NOMOR_WA_ADMIN = "6281249733106"; 

        let db = { barang: [], keluar: [], pending: [] };
        let isSaving = false;

        async function loadData() {
            if(isSaving) return;
            try {
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                db = await res.json();
                renderAll();
                document.getElementById('status-text').innerText = "SISTEM ONLINE";
            } catch (e) { document.getElementById('status-text').innerText = "SISTEM OFFLINE"; }
        }

        function getSisaStok(nama) {
            const b = db.barang.find(x => x.nama === nama);
            if (!b) return 0;
            const k = db.keluar.filter(x => x.nama === nama).reduce((a,c) => a + parseInt(c.jumlah), 0);
            return parseInt(b.stok_awal) - k;
        }

        function renderAll() {
            const tAtk = document.getElementById('tabel-atk');
            const tKebersihan = document.getElementById('tabel-kebersihan');
            const listPending = document.getElementById('list-pending');
            const adminManage = document.getElementById('admin-manage-stok');
            const badge = document.getElementById('notif-badge');
            
            tAtk.innerHTML = ""; tKebersihan.innerHTML = "";
            listPending.innerHTML = ""; adminManage.innerHTML = "";

            db.barang.sort((a,b) => a.nama.localeCompare(b.nama)).forEach((b, idx) => {
                const sisa = getSisaStok(b.nama);
                
                // JIKA STOK HABIS (0), OTOMATIS HAPUS DARI LIST
                if(sisa <= 0) {
                    db.barang = db.barang.filter(x => x.nama !== b.nama);
                    db.keluar = db.keluar.filter(x => x.nama !== b.nama);
                    save();
                    return;
                }

                const row = `<tr>
                    <td class="p-5 font-bold text-xs uppercase">${b.nama}</td>
                    <td class="p-5 text-center font-black ${sisa < 5 ? 'text-red-600' : 'text-slate-900'}">${sisa}</td>
                    <td class="p-5 text-center">${b.img ? `<img src="${b.img}" class="w-10 h-10 rounded-lg mx-auto">` : '-'}</td>
                </tr>`;
                
                if(b.kategori === "KEBERSIHAN") tKebersihan.innerHTML += row;
                else tAtk.innerHTML += row;

                adminManage.innerHTML += `
                    <div class="flex flex-col p-4 bg-slate-50 rounded-2xl border gap-3">
                        <div class="flex justify-between items-center">
                            <div class="text-[10px] font-bold uppercase">${b.nama}<br><span class="text-blue-600">SISA: ${sisa}</span></div>
                            <div class="flex gap-2">
                                <button onclick="editBarang('${b.nama}')" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-[9px]">STOK</button>
                                <button onclick="hapusBarang('${b.nama}')" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[9px]">HAPUS</button>
                            </div>
                        </div>
                        ${b.img ? `<button onclick="hapusFoto('${b.nama}')" class="w-full py-2 bg-amber-100 text-amber-700 text-[9px] font-bold rounded-lg uppercase">Hapus Foto Barang</button>` : ''}
                    </div>`;
            });

            if (db.pending.length > 0) {
                badge.innerText = db.pending.length;
                badge.classList.remove('hidden');
            } else badge.classList.add('hidden');

            db.pending.forEach((p, idx) => {
                listPending.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex flex-col gap-3 text-slate-800 shadow-lg">
                        <div class="text-[10px] font-bold"><span class="text-blue-700 uppercase">${p.nama} (${p.jumlah})</span><br>Oleh: ${p.pengambil}</div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="approve(${idx})" class="bg-green-600 text-white py-2 rounded-xl font-bold text-[9px]">SETUJU</button>
                            <button onclick="reject(${idx})" class="bg-red-600 text-white py-2 rounded-xl font-bold text-[9px]">TOLAK</button>
                        </div>
                    </div>`;
            });
            filterBarangByKategori();
        }

        function filterBarangByKategori() {
            const kat = document.getElementById('filter-kategori-ambil').value;
            const select = document.getElementById('select-barang');
            select.innerHTML = '<option value="">PILIH BARANG...</option>';
            db.barang.filter(x => x.kategori === kat).forEach(b => {
                select.innerHTML += `<option value="${b.nama}">${b.nama}</option>`;
            });
        }

        function hapusFoto(namaBarang) {
            if(confirm('Hapus foto barang ini?')) {
                const b = db.barang.find(x => x.nama === namaBarang);
                if(b) { b.img = ""; save(); }
            }
        }

        function hapusBarang(namaBarang) {
            if (confirm(`Hapus permanen ${namaBarang}?`)) {
                db.barang = db.barang.filter(x => x.nama !== namaBarang);
                db.keluar = db.keluar.filter(x => x.nama !== namaBarang);
                save();
            }
        }

        function editBarang(namaBarang) {
            const b = db.barang.find(x => x.nama === namaBarang);
            const baru = prompt(`Update Stok Awal ${namaBarang}:`, b.stok_awal);
            if (baru !== null) { b.stok_awal = baru; save(); }
        }

        function updateMaxStockInfo() {
            const
