<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATK ONLINE SMKN 2 PONOROGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .nav-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-nav.active { color: #2563eb; transform: translateY(-5px); }
        .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 50%; border: 2px solid white; font-weight: 800; }
        input, select { text-transform: uppercase; }
    </style>
</head>
<body class="pb-28">

    <div class="header-gradient pt-14 pb-24 px-8 rounded-b-[50px] shadow-2xl text-white relative text-center">
        <h1 class="text-xl font-800 tracking-tighter italic leading-tight uppercase">ATK ONLINE</h1>
        <h2 class="text-sm font-bold opacity-80 mt-1 uppercase">SMK Negeri 2 Ponorogo</h2>
        <p id="status-text" class="text-[9px] font-bold opacity-50 tracking-[3px] mt-4 uppercase text-blue-200">System Ready</p>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-12 relative z-20">
        
        <div id="page-stok" class="space-y-6">
            <div class="bg-white rounded-[30px] shadow-xl overflow-hidden border border-white">
                <div class="bg-slate-800 p-4 text-white text-[10px] font-black tracking-widest uppercase text-center">📦 Kelompok ATK</div>
                <table class="w-full">
                    <tbody id="tabel-atk" class="divide-y divide-slate-50 text-slate-700"></tbody>
                </table>
            </div>
            <div class="bg-white rounded-[30px] shadow-xl overflow-hidden border border-white">
                <div class="bg-blue-800 p-4 text-white text-[10px] font-black tracking-widest uppercase text-center">🧹 Kelompok Kebersihan</div>
                <table class="w-full">
                    <tbody id="tabel-kebersihan" class="divide-y divide-slate-50 text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div id="page-ambil" class="hidden">
            <div class="bg-white p-8 rounded-[40px] shadow-2xl">
                <h2 class="text-2xl font-800 text-slate-800 mb-6 uppercase text-center text-lg">Ambil Barang</h2>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">1. Pilih Kategori</label>
                        <select id="filter-kategori-ambil" onchange="filterBarangByKategori()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold">
                            <option value="ATK">ATK (Alat Tulis Kantor)</option>
                            <option value="KEBERSIHAN">ALAT KEBERSIHAN</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">2. Nama Barang</label>
                        <select id="select-barang" onchange="updateMaxStockInfo()" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                            <option value="">PILIH BARANG...</option>
                        </select>
                        <p id="info-stok-max" class="text-[10px] ml-2 font-bold text-blue-600"></p>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">3. Jumlah</label>
                        <input type="number" id="jumlah-ambil" placeholder="0" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">4. Nama Pengambil</label>
                        <input type="text" id="nama-pengambil" placeholder="NAMA GURU / STAF" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    </div>
                    <button onclick="prosesValidasiAmbil()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-800 shadow-xl active:scale-95 transition-all uppercase">Kirim Permintaan</button>
                </div>
            </div>
        </div>

        <div id="page-admin" class="hidden space-y-6">
            <div id="admin-auth" class="bg-white p-10 rounded-[40px] shadow-2xl text-center">
                <h2 class="text-xl font-800 text-slate-800 mb-6 uppercase text-xs tracking-widest">Akses Admin SMKN 2</h2>
                <input type="password" id="pin-admin" placeholder="****" class="w-full p-5 bg-slate-50 rounded-2xl text-center text-3xl tracking-[12px] mb-6 outline-none">
                <button onclick="cekPin()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold uppercase tracking-widest">Buka Panel</button>
            </div>

            <div id="admin-content" class="hidden space-y-6">
                <div class="bg-blue-600 p-8 rounded-[40px] text-white shadow-xl">
                    <h3 class="font-bold text-[10px] mb-6 uppercase tracking-widest">🔔 Permintaan Pending</h3>
                    <div id="list-pending" class="space-y-4"></div>
                </div>

                <div class="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">📋 Kelola Data Barang</h3>
                    <div id="admin-manage-stok" class="space-y-4"></div>
                </div>

                <div class="bg-white p-8 rounded-[40px] shadow-xl border-t-4 border-slate-900">
                    <h3 class="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest">➕ Tambah Barang Baru</h3>
                    <div class="space-y-4">
                        <select id="add-kategori" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                            <option value="ATK">ATK</option>
                            <option value="KEBERSIHAN">ALAT KEBERSIHAN</option>
                        </select>
                        <input type="text" id="add-nama" placeholder="NAMA BARANG" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <input type="number" id="add-stok" placeholder="STOK AWAL" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        
                        <div onclick="document.getElementById('add-foto').click()" class="p-8 border-2 border-dashed border-slate-100 rounded-3xl text-center bg-slate-50 cursor-pointer">
                            <input type="file" id="add-foto" accept="image/*" class="hidden">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">FOTO BARANG (OPSIONAL)</span>
                            <img id="preview-foto" src="" class="hidden w-32 h-32 object-cover rounded-3xl mx-auto mt-4 shadow-lg">
                        </div>
                        
                        <button onclick="tambahBarang()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold uppercase">Simpan Barang</button>
                    </div>
                </div>
                <button onclick="logoutAdmin()" class="w-full bg-red-50 text-red-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Keluar Admin</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 nav-card p-6 px-10 flex justify-around items-center rounded-t-[45px] shadow-2xl z-[100]">
        <button onclick="showPage('stok')" id="nav-stok" class="btn-nav active flex flex-col items-center gap-1">
